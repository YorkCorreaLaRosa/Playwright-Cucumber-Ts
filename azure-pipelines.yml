parameters:
  - name: testTags
    displayName: 'Etiquetas de Cucumber a ejecutar (ej. @test, @login, @smoke. Dejar vacío para ejecutar todo)'
    type: string
    default: ''

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Variables por defecto. Pueden ser sobrescritas desde la UI de Azure DevOps
  BROWSER: 'chromium'
  HEADLESS: 'true'
  BASE_URL: 'https://www.saucedemo.com'

steps:
  # 1. Instalar Node.js
  - task: UseNode@1
    inputs:
      version: '22.x'
    displayName: 'Instalar Node.js'

  # 2. Instalar dependencias del proyecto (incluye playwright y serenity/js)
  - script: npm ci --legacy-peer-deps
    displayName: 'Instalar dependencias con npm ci'

  # 3. Instalar navegadores de Playwright y dependencias del sistema operativo (Ubuntu)
  - script: npx playwright install --with-deps
    displayName: 'Instalar navegadores de Playwright'

  # 4. Ejecutar los escenarios de Cucumber con Playwright Test
  # Usamos continueOnError: true para asegurar que si un test falla, el pipeline continúe 
  # y publique los resultados en Azure DevOps.
  - script: |
      if [ -z "$TEST_TAGS" ]; then
        echo "No se especificaron tags. Ejecutando todos los escenarios..."
        npm test
      else
        echo "Ejecutando escenarios con la etiqueta/grep: $TEST_TAGS"
        npm test -- --grep "$TEST_TAGS"
      fi
    displayName: 'Ejecutar pruebas automatizadas'
    env:
      BROWSER: $(BROWSER)
      HEADLESS: $(HEADLESS)
      BASE_URL: $(BASE_URL)
      SAUCE_USERNAME: $(SAUCE_USERNAME)
      SAUCE_PASSWORD: $(SAUCE_PASSWORD)
      TEST_TAGS: ${{ parameters.testTags }}
    continueOnError: true

  # 5. Generar reporte HTML de Serenity BDD
  - script: npm run report
    displayName: 'Generar reporte HTML de Serenity BDD'
    condition: always()

  # 6. Publicar Resultados JUnit en la pestaña "Tests" de Azure DevOps
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/junit-results.xml'
      searchFolder: '$(System.DefaultWorkingDirectory)'
      mergeTestResults: true
      testRunTitle: 'Playwright + Cucumber Run'
    displayName: 'Publicar resultados JUnit en Azure DevOps'
    condition: always()

  # 7. Publicar reporte visual de Serenity como artefacto de compilación
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'target/site/serenity/'
      ArtifactName: 'serenity-report'
      publishLocation: 'Container'
    displayName: 'Publicar artefacto Serenity HTML'
    condition: always()
